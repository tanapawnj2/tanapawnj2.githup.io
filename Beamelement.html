<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<title>Beam Analysis — Matrix Stiffness Method</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
html{overflow-x:auto;}
:root{--bg:#0b0d12;--surface:#13161e;--surface2:#191d28;--border:#222736;--accent:#00e5ff;--accent2:#ff6b35;--accent3:#a8ff78;--accent4:#c084fc;--text:#e8ecf4;--muted:#8896b8;--r:#ffd60a;--pink:#f9a8d4;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans Thai',sans-serif;min-height:100vh;min-width:1280px;overflow-x:auto;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0;}
header{position:relative;z-index:1;padding:16px 32px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
header h1{font-family:'Space Mono',monospace;font-size:21px;color:var(--accent);}
#hdr-sub{font-size:15px;color:#c8d0e8;}
.mbadge{font-family:'Space Mono',monospace;font-size:13px;padding:2px 7px;border-radius:9px;background:rgba(192,132,252,.12);color:var(--accent4);border:1px solid rgba(192,132,252,.28);}
.ibadge{font-family:'Space Mono',monospace;font-size:13px;padding:2px 7px;border-radius:9px;background:rgba(168,255,120,.1);color:var(--accent3);border:1px solid rgba(168,255,120,.28);display:none;}
.main{position:relative;z-index:1;display:grid;grid-template-columns:260px 280px minmax(500px,900px);min-height:calc(100vh - 58px);overflow-x:auto;align-items:stretch;}
.col-left{display:flex;flex-direction:column;border-right:1px solid var(--border);min-width:260px;align-self:stretch;}
.col-props{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 12px;overflow-y:auto;flex-shrink:0;}
.col-supports{background:var(--surface);padding:14px 12px;overflow-y:auto;flex:1;min-height:0;}
.col-loads{background:var(--surface);border-right:1px solid var(--border);border-left:1px solid var(--border);padding:14px 12px;overflow-y:auto;min-width:280px;align-self:stretch;}
.panel{display:none;}
.sec{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:2px;color:#c8d0e8;text-transform:uppercase;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.sec:first-child{margin-top:0;}
.field{margin-bottom:9px;}
label{display:block;font-size:14px;color:#c8d0e8;margin-bottom:3px;font-family:'Space Mono',monospace;}
input[type=number]{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 9px;border-radius:5px;font-family:'Space Mono',monospace;font-size:16px;outline:none;transition:border-color .2s;}
input[type=number]:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,229,255,.08);}
.scard{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 10px;margin-bottom:7px;}
.scard-hd{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.snum{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,214,10,.18);color:#ffd60a;border:1px solid rgba(255,214,10,.4);}
.slbl{font-family:'Space Mono',monospace;font-size:14px;color:var(--muted);flex:1;}
.srem{background:none;border:none;color:#8896b8;cursor:pointer;font-size:17px;padding:1px 4px;border-radius:3px;transition:color .2s;}
.srem:hover{color:#ff4d6d;}
.tbtns{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:7px;}
.tbtn{padding:5px 3px;background:var(--surface);border:1px solid var(--border);color:#8896b8;border-radius:4px;cursor:pointer;font-family:'Space Mono',monospace;font-size:9px;transition:all .15s;text-align:center;line-height:1.3;}
.tbtn:hover{border-color:var(--accent);color:var(--text);}
.tbtn.on{background:rgba(255,214,10,.08);border-color:#ffd60a;color:#ffd60a;}
.tbtn.on.fx{background:rgba(168,255,120,.08);border-color:var(--accent3);color:var(--accent3);}
.tbtn.on.fr{background:rgba(255,77,109,.07);border-color:#ff4d6d;color:#ff4d6d;}
.tbtn.on.sp{background:rgba(255,165,0,.07);border-color:#ffa500;color:#ffa500;}
.add-supp{width:100%;padding:7px;background:rgba(255,214,10,.06);border:1px dashed rgba(255,214,10,.25);color:#ffd60a;border-radius:5px;cursor:pointer;font-family:'Space Mono',monospace;font-size:14px;transition:all .2s;margin-bottom:2px;}
.add-supp:hover{background:rgba(255,214,10,.12);border-color:#ffd60a;}
.lrow{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px;margin-bottom:7px;}
.lhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.lbadge{font-family:'Space Mono',monospace;font-size:13px;padding:2px 6px;border-radius:3px;background:rgba(255,107,53,.14);color:var(--accent2);border:1px solid rgba(255,107,53,.28);}
.lbadge.u{background:rgba(168,255,120,.09);color:var(--accent3);border-color:rgba(168,255,120,.28);}
.lbadge.m{background:rgba(192,132,252,.09);color:var(--accent4);border-color:rgba(192,132,252,.28);}
.xbtn{background:none;border:none;color:#8896b8;cursor:pointer;font-size:17px;padding:1px 4px;border-radius:3px;transition:color .2s;}
.xbtn:hover{color:#ff4d6d;}
.lf{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.lf .fw{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.lf input{padding:5px 7px;font-size:15px;}
.lf label{font-size:13px;}
.arow{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:4px;}
.abtn{width:100%;padding:7px;background:rgba(0,229,255,.06);border:1px dashed rgba(0,229,255,.25);color:var(--accent);border-radius:5px;cursor:pointer;font-family:'Space Mono',monospace;font-size:14px;transition:all .2s;}
.abtn:hover{background:rgba(0,229,255,.13);border-color:var(--accent);}
.calc-btn{width:100%;padding:11px;background:var(--accent);color:#000;border:none;border-radius:6px;font-family:'Space Mono',monospace;font-size:16px;font-weight:700;cursor:pointer;margin-top:12px;letter-spacing:.8px;transition:all .2s;}
.calc-btn:hover{background:#2ef0ff;transform:translateY(-1px);box-shadow:0 4px 18px rgba(0,229,255,.25);}
.results{padding:18px 22px;overflow-y:auto;min-width:0;min-height:calc(100vh - 58px);}
.results-inner{max-width:900px;}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:360px;color:var(--muted);text-align:center;gap:10px;}
.dblock{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:14px 16px;margin-bottom:12px;}
.dtitle{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#c8d0e8;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.dinfo{font-size:13px;color:var(--accent4);background:rgba(192,132,252,.08);border:1px solid rgba(192,132,252,.2);padding:1px 6px;border-radius:7px;}
canvas{width:100%;display:block;border-radius:3px;}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:7px;margin-bottom:12px;}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:10px 12px;border-left:3px solid var(--r);}
.rcard.mc{border-left-color:var(--accent2);}
.rl{font-family:'Space Mono',monospace;font-size:12px;color:#c8d0e8;letter-spacing:.6px;margin-bottom:3px;}
.rv{font-family:'Space Mono',monospace;font-size:19px;color:var(--r);font-weight:700;}
.rcard.mc .rv{color:var(--accent2);}
.ru{font-size:8.5px;color:var(--muted);margin-left:2px;}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.tag{font-family:'Space Mono',monospace;font-size:13px;padding:3px 8px;border-radius:12px;border:1px solid;}
.tag.s{color:var(--accent);border-color:rgba(0,229,255,.3);background:rgba(0,229,255,.05);}
.tag.mo{color:var(--accent2);border-color:rgba(255,107,53,.3);background:rgba(255,107,53,.05);}
.tag.id{color:var(--accent3);border-color:rgba(168,255,120,.3);background:rgba(168,255,120,.05);}
.tag.mt{color:var(--accent4);border-color:rgba(192,132,252,.3);background:rgba(192,132,252,.05);}
.tag.pk{color:var(--pink);border-color:rgba(249,168,212,.3);background:rgba(249,168,212,.05);}
.minfo{background:rgba(192,132,252,.06);border:1px solid rgba(192,132,252,.2);border-radius:7px;padding:9px 12px;margin-bottom:12px;font-family:'Space Mono',monospace;}
.minfo .mt2{font-size:8.5px;letter-spacing:1px;color:#c8d0e8;margin-bottom:5px;}
.minfo .mr{display:flex;gap:14px;flex-wrap:wrap;}
.minfo .mv{font-size:17px;color:var(--accent4);}
.minfo .mk{font-size:12px;color:#c8d0e8;}
.sum-table{width:100%;border-collapse:collapse;font-family:'Space Mono',monospace;font-size:14px;}
.sum-table th{text-align:left;padding:5px 8px;border-bottom:1px solid var(--border);color:#c8d0e8;font-size:12px;letter-spacing:1px;text-transform:uppercase;}
.sum-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.025);}
.sum-table tr:last-child td{border-bottom:none;}
.sum-table td.n{color:var(--accent);text-align:right;}
.sum-table td.ng{color:var(--accent2);text-align:right;}
.sum-table .hr td{background:rgba(0,229,255,.03);}
.node-strip{display:flex;align-items:center;padding:5px 0;overflow-x:auto;}
.nd{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.nl{height:2px;background:rgba(168,255,120,.2);flex:1;min-width:10px;}
.nlb{color:#c8d0e8;margin:0 2px;font-family:'Space Mono',monospace;font-size:11px;}

.err{background:rgba(255,77,109,.09);border:1px solid rgba(255,77,109,.28);color:#ff4d6d;padding:9px 12px;border-radius:6px;font-size:16px;margin-bottom:10px;}
.cb-block{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:14px 16px;margin-bottom:12px;}
.cb-title{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#c8d0e8;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.cb-span-row{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;margin-bottom:8px;}
.cb-span-hd{font-family:'Space Mono',monospace;font-size:13px;color:var(--accent4);margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
.cb-val{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--accent3);}
.cb-sub{font-size:12px;color:var(--muted);margin-top:2px;font-family:'Space Mono',monospace;}
.cb-detail{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:8px;}
.cb-m{text-align:center;background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.1);border-radius:5px;padding:5px 4px;}
.cb-ml{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;}
.cb-mv{font-size:13px;font-weight:700;color:var(--accent);font-family:'Space Mono',monospace;}
.cb-note{font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:6px;padding:5px 8px;background:rgba(192,132,252,.06);border-radius:5px;border-left:2px solid var(--accent4);}
.cb-warn{color:#ffa500;font-size:12px;font-family:'Space Mono',monospace;}
.cv-tooltip{position:fixed;background:rgba(13,15,14,0.92);border:1px solid rgba(255,255,255,0.15);color:#e8ecf4;font-family:'Space Mono',monospace;font-size:11px;padding:5px 9px;border-radius:5px;pointer-events:none;display:none;z-index:999;white-space:nowrap;line-height:1.6;}

.rxn-row{display:flex;align-items:stretch;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.rxn-bar-wrap{flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:14px 16px;}

</style>
</head>
<body>
<header>
  <h1>&#11035; BEAM ANALYZER</h1>
  <span id="hdr-sub">Multi-Support Beam</span>
  <span class="mbadge">MATRIX STIFFNESS METHOD</span>
  <span class="ibadge" id="ibadge">INDETERMINATE</span>
</header>
<div class="main">

<!-- Col 1a: Beam Properties -->
<div class="col-left">
  <div class="col-props">
    <div class="sec" style="margin-top:0">Beam Properties</div>
    <div class="field"><label>Length L (m)</label><input type="number" id="beamL" value="0" min="0" step="0.1" oninput="updateHeader()"></div>
    <div class="sec">Beam Segments <span style="color:#8896b8;font-size:12px;letter-spacing:0;text-transform:none;font-family:sans-serif">(E, I per segment)</span></div>
    <div id="segc"></div>
    <button class="add-supp" style="border-color:rgba(0,229,255,.25);color:var(--accent);background:rgba(0,229,255,.06);" onclick="addSegment()">&#xFF0B; Add Segment</button>
  </div>

  <!-- Col 1b: Supports -->
  <div class="col-supports">
    <div class="sec" style="margin-top:0">Supports <span style="color:#8896b8;font-size:12px;letter-spacing:0;text-transform:none;font-family:sans-serif">(unlimited)</span></div>
    <div id="sc"></div>
    <button class="add-supp" onclick="addSupport()">&#xFF0B; Add Support</button>
  </div>
</div>

<!-- Col 2: Applied Loads -->
<div class="col-loads">
  <button class="calc-btn" onclick="analyze()" style="margin-top:0;margin-bottom:12px">&#9654; Calculate</button>
  <div class="sec" style="margin-top:0">Applied Loads</div>
  <div id="lc"></div>
  <div class="arow">
    <button class="abtn" onclick="addLoad('point')">+ Point Load</button>
    <button class="abtn" onclick="addLoad('udl')">+ Uniform Load</button>
  </div>
  <button class="abtn" style="width:100%;margin-top:4px;" onclick="addLoad('trap')">+ Trapezoidal Load</button>
  <button class="abtn" style="width:100%;border-color:rgba(192,132,252,.2);color:var(--accent4);margin-top:4px;" onclick="addLoad('moment')">+ Applied Moment</button>
</div>
<div class="results" id="results">
  <div class="welcome">
    <svg width="54" height="54" viewBox="0 0 64 64" fill="none">
      <rect x="8" y="30" width="48" height="4" rx="2" fill="#00e5ff" opacity=".6"/>
      <circle cx="10" cy="34" r="4" stroke="#ffd60a" stroke-width="2" fill="none"/>
      <circle cx="32" cy="34" r="4" stroke="#ffd60a" stroke-width="2" fill="none"/>
      <polygon points="54,29 48,39 60,39" stroke="#ffd60a" stroke-width="2" fill="none"/>
      <line x1="32" y1="12" x2="32" y2="30" stroke="#ff4d6d" stroke-width="2"/>
      <polygon points="32,30 29,22 35,22" fill="#ff4d6d"/>
    </svg>
    <p style="font-size:17px;">Enter data and click <strong style="color:var(--accent)">Calculate</strong><br>
    <span style="font-size:15px;font-family:'Space Mono',monospace;color:var(--accent4)">Multi-Support — Continuous Beam</span></p>
  </div>
</div>
</div>
<script>
// ── Cb — Lateral-Torsional Buckling Factor (AISC 360 Eq. F1-1) ──────────
// Automatically computed per span between consecutive supports.
// Cb = 12.5·Mmax / (2.5·Mmax + 3·MA + 4·MB + 3·MC)

function calcCbForSpan(xs, Marr, x1, x2) {
  // Collect raw M values (signed) within [x1, x2]
  var pts = [];
  for (var i = 0; i < xs.length; i++) {
    if (xs[i] >= x1 - 1e-9 && xs[i] <= x2 + 1e-9)
      pts.push({x: xs[i], M: Marr[i]});
  }
  if (pts.length < 2) return null;

  var Lb = x2 - x1;

  // Mmax = max |M| in span
  var Mmax = 0;
  for (var i = 0; i < pts.length; i++) if (Math.abs(pts[i].M) > Mmax) Mmax = Math.abs(pts[i].M);
  if (Mmax < 1e-9) return {Cb: null, Mmax:0, MA:0, MB:0, MC:0, note:'M ≈ 0 ตลอดช่วง'};

  // Interpolate signed M at a given x, then take |M|
  function interpAbsM(xq) {
    for (var i = 0; i < pts.length-1; i++) {
      if (pts[i].x <= xq + 1e-9 && xq <= pts[i+1].x + 1e-9) {
        var t = (xq - pts[i].x) / (pts[i+1].x - pts[i].x);
        return Math.abs(pts[i].M + t*(pts[i+1].M - pts[i].M));
      }
    }
    return Math.abs(pts[pts.length-1].M);
  }

  var MA = interpAbsM(x1 + Lb*0.25);
  var MB = interpAbsM(x1 + Lb*0.50);
  var MC = interpAbsM(x1 + Lb*0.75);
  var denom = 2.5*Mmax + 3*MA + 4*MB + 3*MC;
  var Cb = denom < 1e-12 ? null : 12.5*Mmax / denom;
  return {Cb:Cb, Mmax:Mmax, MA:MA, MB:MB, MC:MC, Lb:Lb};
}

function renderCbResults(xs, Marr, slistAll, L) {
  var block = document.getElementById('cb-results-block');
  if (!block) return;

  var STRUCT_TYPES = {pin:1, roller:1, fixed:1, pin_r:1, roller_r:1};
  var LATERAL_ONLY = {lateral:1};

  // Collect all boundary points: structural supports + lateral braces
  var allPts = [];
  for (var i = 0; i < slistAll.length; i++) {
    var s = slistAll[i];
    if (STRUCT_TYPES[s.type] || LATERAL_ONLY[s.type]) allPts.push(s.x);
  }
  allPts.sort(function(a,b){return a-b;});
  allPts = allPts.filter(function(v,i,a){return i===0||Math.abs(v-a[i-1])>1e-9;});

  if (allPts.length < 2) { block.innerHTML = ''; return; }

  // Build all sub-spans
  var subSpans = [];
  for (var i = 0; i < allPts.length-1; i++) {
    var x1 = allPts[i], x2 = allPts[i+1];
    var r = calcCbForSpan(xs, Marr, x1, x2);
    subSpans.push({x1:x1, x2:x2, Lb:x2-x1, result:r});
  }

  var html = '<div class="cb-block">' +
    '<div class="cb-title">&#9670; C<sub>b</sub> — Lateral-Torsional Buckling Modification Factor' +
    '<span style="font-size:11px;color:var(--muted);letter-spacing:0;text-transform:none;font-family:sans-serif;margin-left:6px;">AISC 360 Eq. F1-1</span></div>' +
    '<div style="font-family:Space Mono,monospace;font-size:11px;color:var(--muted);margin-bottom:10px;padding:6px 9px;background:rgba(0,229,255,.04);border-radius:5px;border-left:2px solid var(--accent);">' +
    'C<sub>b</sub> = 12.5·M<sub>max</sub> / (2.5·M<sub>max</sub> + 3·M<sub>A</sub> + 4·M<sub>B</sub> + 3·M<sub>C</sub>)' +
    '</div>';

  var cbSumRows = '';
  for (var si = 0; si < subSpans.length; si++) {
    var sub = subSpans[si];
    var r = sub.result;
    var spanLabel = 'Span '+(si+1)+'  (x = '+sub.x1.toFixed(2)+' → '+sub.x2.toFixed(2)+' m,  Lb = '+sub.Lb.toFixed(3)+' m)';

    html += '<div class="cb-span-row">';
    html += '<div class="cb-span-hd"><span>'+spanLabel+'</span>';

    if (!r || r.note) {
      html += (r&&r.note?'</div><div style="color:var(--muted);font-size:12px;font-family:Space Mono,monospace;">'+r.note+'</div>':'<span class="cb-warn">⚠ ไม่พบข้อมูล</span></div>');
      html += '</div>';
      continue;
    }

    var statusNote = '';
    if (r.Cb !== null) {
      if      (r.Cb < 1.0)   statusNote = '<span style="color:#ff4d6d;font-size:11px;font-family:Space Mono,monospace;">⚠ Cb &lt; 1.0</span>';
      else if (r.Cb <= 1.67) statusNote = '<span style="color:var(--accent3);font-size:11px;font-family:Space Mono,monospace;">✓ Conservative</span>';
      else if (r.Cb <= 2.3)  statusNote = '<span style="color:#ffd60a;font-size:11px;font-family:Space Mono,monospace;">↑ High Cb</span>';
      else                   statusNote = '<span style="color:#ffa500;font-size:11px;font-family:Space Mono,monospace;">⚠ Cb &gt; 2.3</span>';
    }
    html += statusNote + '</div>';

    var cbColor = r.Cb===null?'var(--muted)':(r.Cb<1?'#ff4d6d':r.Cb<=2.3?'var(--accent3)':'#ffa500');
    html += '<div style="display:flex;align-items:flex-end;gap:20px;flex-wrap:wrap;margin-bottom:8px;">';
    html += '<div><div class="cb-sub">C<sub>b</sub></div><div class="cb-val" style="color:'+cbColor+';">'+(r.Cb!==null?r.Cb.toFixed(4):'N/A')+'</div></div>';
    html += '</div>';
    html += '<div class="cb-detail">' +
      '<div class="cb-m"><div class="cb-ml">M<sub>max</sub></div><div class="cb-mv">'+r.Mmax.toFixed(2)+'</div><div class="cb-ml">kg·m</div></div>' +

function validateSegments(L){
  var keys=Object.keys(segments);
  if(keys.length===0) return 'Please add at least one segment';
  for(var i=0;i<keys.length;i++){
    var s=segments[keys[i]];
    if(isNaN(s.x1)||isNaN(s.x2)) return 'Segment #'+keys[i]+': invalid x values';
    if(s.x1>=s.x2) return 'Segment #'+keys[i]+': x₂ must be > x₁';
    if(s.x1<-1e-9||s.x2>L+1e-9) return 'Segment #'+keys[i]+': outside beam [0,'+L+']';
    if(isNaN(s.E)||s.E<=0) return 'Segment #'+keys[i]+': E must be > 0';
    if(isNaN(s.I)||s.I<=0) return 'Segment #'+keys[i]+': I must be > 0';
  }
  var sorted=keys.map(function(k){return segments[k];}).sort(function(a,b){return a.x1-b.x1;});
  if(Math.abs(sorted[0].x1)>1e-9) return 'First segment must start at x=0';
  if(Math.abs(sorted[sorted.length-1].x2-L)>1e-9) return 'Last segment must end at x=L='+L;
  for(var i=1;i<sorted.length;i++){
    if(Math.abs(sorted[i].x1-sorted[i-1].x2)>1e-9)
      return 'Gap between segments at x='+sorted[i-1].x2+' → '+sorted[i].x1;
  }
  return null;
}

function collectLoads(L){

      loads.push({type:'point',P:P,x:x});
    } else if(type==='udl'){
      var w=+document.getElementById('lw-'+id).value;
      var x1=+document.getElementById('lx1-'+id).value;
      var x2=+document.getElementById('lx2-'+id).value;
      if(isNaN(w)||isNaN(x1)||isNaN(x2)) return {err:'Uniform Load #'+id+': missing data'};
      if(x1>=x2) return {err:'Uniform Load #'+id+': x2 must be > x1'};
      loads.push({type:'udl',w:w,x1:x1,x2:x2});
    } else if(type==='trap'){
      var w1=+document.getElementById('lw1-'+id).value;
      var w2=+document.getElementById('lw2-'+id).value;
      var x1t=+document.getElementById('lx1t-'+id).value;
      var x2t=+document.getElementById('lx2t-'+id).value;
      if(isNaN(w1)||isNaN(w2)||isNaN(x1t)||isNaN(x2t)) return {err:'Trap Load #'+id+': missing data'};
      if(x1t>=x2t) return {err:'Trap Load #'+id+': x2 must be > x1'};
      loads.push({type:'trap',w1:w1,w2:w2,x1:x1t,x2:x2t});
    } else {
      var M=+document.getElementById('lm-'+id).value;
      var xm=+document.getElementById('lx-'+id).value;
