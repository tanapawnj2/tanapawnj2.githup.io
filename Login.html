<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CivilToolKit — เข้าสู่ระบบ</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e10; --surface: #18181b; --surface2: #222226;
      --border: rgba(255,255,255,0.08); --text: #f4f4f5; --muted: #71717a;
      --accent: #e8d5a3; --accent-dim: rgba(232,213,163,0.12);
      --danger: #f87171; --success: #86efac; --radius: 14px;
    }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; top: -30%; left: -10%; width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(232,213,163,0.06) 0%, transparent 65%);
      pointer-events: none;
    }
    .auth-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 2.5rem 2.25rem;
      width: 100%; max-width: 420px; position: relative; z-index: 1;
      animation: fadeUp 0.45s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    .brand { font-family: 'Instrument Serif', serif; font-size: 1.75rem; color: var(--accent); margin-bottom: 0.3rem; }
    .subtitle { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }
    .tabs {
      display: grid; grid-template-columns: 1fr 1fr; background: var(--surface2);
      border-radius: 10px; padding: 4px; margin-bottom: 1.75rem; gap: 4px;
    }
    .tab-btn {
      background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem; font-weight: 500; padding: 0.55rem 1rem; border-radius: 7px; cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .tab-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 6px rgba(0,0,0,0.4); }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--muted); margin-bottom: 0.4rem; letter-spacing: 0.03em; text-transform: uppercase; }
    input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 9px; padding: 0.7rem 0.9rem; font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; color: var(--text); outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: rgba(232,213,163,0.4); box-shadow: 0 0 0 3px rgba(232,213,163,0.08); }
    input::placeholder { color: #3f3f46; }
    .btn-primary {
      width: 100%; background: var(--accent); color: #18180b; border: none; border-radius: 9px;
      padding: 0.75rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500;
      cursor: pointer; margin-top: 0.5rem; transition: opacity 0.2s, transform 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
    .divider { display: flex; align-items: center; gap: 10px; margin: 1.25rem 0; color: var(--muted); font-size: 0.75rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .btn-google {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 9px;
      padding: 0.7rem; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; color: var(--text); cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-google:hover { background: #2a2a2e; border-color: rgba(255,255,255,0.15); }
    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
    .msg { font-size: 0.82rem; padding: 0.65rem 0.85rem; border-radius: 8px; margin-bottom: 1rem; display: none; }
    .msg.error   { background: rgba(248,113,113,0.1); color: var(--danger); border: 1px solid rgba(248,113,113,0.2); }
    .msg.success { background: rgba(134,239,172,0.1); color: var(--success); border: 1px solid rgba(134,239,172,0.2); }
    .msg.show    { display: block; }
    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(24,24,11,0.3); border-top-color: #18180b;
      border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #dashboard { display: none; animation: fadeUp 0.4s ease both; }
    .avatar-circle {
      width: 56px; height: 56px; border-radius: 50%; background: var(--accent-dim);
      border: 2px solid rgba(232,213,163,0.3); display: flex; align-items: center; justify-content: center;
      font-family: 'Instrument Serif', serif; font-size: 1.4rem; color: var(--accent); margin-bottom: 1rem;
    }
    .user-name  { font-family: 'Instrument Serif', serif; font-size: 1.5rem; color: var(--text); }
    .user-email { font-size: 0.82rem; color: var(--muted); margin-bottom: 1.75rem; }
    .info-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.15rem; margin-bottom: 1rem; }
    .info-box .ilabel { font-size: 0.75rem; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.04em; }
    .info-box .ivalue { font-size: 0.9rem; color: var(--text); }
    .btn-outline {
      width: 100%; background: none; border: 1px solid var(--border); border-radius: 9px; padding: 0.7rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.875rem; color: var(--muted); cursor: pointer;
      margin-top: 0.75rem; transition: border-color 0.2s, color 0.2s;
    }
    .btn-outline:hover { border-color: var(--danger); color: var(--danger); }
  </style>
</head>
<body>

<div class="auth-card" id="auth-card">
  <div class="brand">CivilToolKit</div>
  <div class="subtitle">ยินดีต้อนรับ — กรุณาเข้าสู่ระบบหรือสมัครสมาชิก</div>
  <div class="tabs">
    <button class="tab-btn active" id="tab-login">เข้าสู่ระบบ</button>
    <button class="tab-btn" id="tab-register">สมัครสมาชิก</button>
  </div>
  <div class="msg" id="msg-box"></div>

  <div id="form-login">
    <div class="form-group">
      <label>อีเมล</label>
      <input type="email" id="login-email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>รหัสผ่าน</label>
      <input type="password" id="login-password" placeholder="••••••••" />
    </div>
    <button class="btn-primary" id="btn-login">เข้าสู่ระบบ</button>
    <div class="divider">หรือ</div>
    <button class="btn-google" id="btn-google-login">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      ดำเนินการต่อด้วย Google
    </button>
  </div>

  <div id="form-register" style="display:none;">
    <div class="form-group">
      <label>ชื่อที่แสดง</label>
      <input type="text" id="reg-name" placeholder="ชื่อของคุณ" />
    </div>
    <div class="form-group">
      <label>อีเมล</label>
      <input type="email" id="reg-email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>รหัสผ่าน</label>
      <input type="password" id="reg-password" placeholder="อย่างน้อย 6 ตัวอักษร" />
    </div>
    <div class="form-group">
      <label>ยืนยันรหัสผ่าน</label>
      <input type="password" id="reg-password-confirm" placeholder="พิมพ์รหัสผ่านอีกครั้ง" />
    </div>
    <button class="btn-primary" id="btn-register">สร้างบัญชี</button>
    <div class="divider">หรือ</div>
    <button class="btn-google" id="btn-google-register">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      สมัครด้วย Google
    </button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged,
    updateProfile, sendEmailVerification
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyBKhes9uVB7tFATNChmYJtkSGXtoV8pGoI",
    authDomain:        "civiltoolskit.firebaseapp.com",
    projectId:         "civiltoolskit",
    storageBucket:     "civiltoolskit.firebasestorage.app",
    messagingSenderId: "108662763128",
    appId:             "1:108662763128:web:864248bfaf2fd27c52878d",
    measurementId:     "G-K7F45DZKSY"
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const provider = new GoogleAuthProvider();

  // ── Helpers ──
  function showMsg(text, type) {
    const box = document.getElementById("msg-box");
    box.textContent = text;
    box.className   = "msg " + type + " show";
  }

  function setLoading(btnId, loading, defaultText) {
    const btn     = document.getElementById(btnId);
    btn.disabled  = loading;
    btn.innerHTML = loading ? '<span class="spinner"></span> กำลังดำเนินการ...' : defaultText;
  }

  function getErrorMsg(code) {
    const map = {
      "auth/email-already-in-use":  "อีเมลนี้ถูกใช้งานแล้ว",
      "auth/invalid-email":         "รูปแบบอีเมลไม่ถูกต้อง",
      "auth/weak-password":         "รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร",
      "auth/user-not-found":        "ไม่พบบัญชีนี้ในระบบ",
      "auth/wrong-password":        "รหัสผ่านไม่ถูกต้อง",
      "auth/invalid-credential":    "อีเมลหรือรหัสผ่านไม่ถูกต้อง",
      "auth/popup-closed-by-user":  "ปิด popup ก่อนลงชื่อเข้าใช้",
      "auth/too-many-requests":     "ลองมากเกินไป กรุณารอสักครู่",
      "auth/operation-not-allowed": "กรุณาเปิด Email/Password ใน Firebase Console ก่อน",
    };
    return map[code] || "เกิดข้อผิดพลาด: " + code;
  }

  function switchTab(tab) {
    document.getElementById("form-login").style.display    = tab === "login"    ? "block" : "none";
    document.getElementById("form-register").style.display = tab === "register" ? "block" : "none";
    document.getElementById("tab-login").classList.toggle("active",    tab === "login");
    document.getElementById("tab-register").classList.toggle("active", tab === "register");
    document.getElementById("msg-box").className = "msg";
  }

  // ── Auth state ──
  onAuthStateChanged(auth, user => {
    if (user && user.emailVerified) {
      window.location.href = "Beamelement.html";
    } else {
      document.getElementById("auth-card").style.display = "block";
    }
  });

  // ── Tab buttons ──
  document.getElementById("tab-login").addEventListener("click", () => switchTab("login"));
  document.getElementById("tab-register").addEventListener("click", () => switchTab("register"));

  // ── Register ──
  document.getElementById("btn-register").addEventListener("click", async () => {
    const name    = document.getElementById("reg-name").value.trim();
    const email   = document.getElementById("reg-email").value.trim();
    const pass    = document.getElementById("reg-password").value;
    const confirm = document.getElementById("reg-password-confirm").value;
    if (!name || !email || !pass || !confirm) return showMsg("กรุณากรอกข้อมูลให้ครบ", "error");
    if (pass.length < 6)   return showMsg("รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร", "error");
    if (pass !== confirm)  return showMsg("รหัสผ่านทั้งสองช่องไม่ตรงกัน", "error");
    setLoading("btn-register", true, "สร้างบัญชี");
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      await sendEmailVerification(cred.user);
      await signOut(auth);
      showMsg("สมัครสมาชิกสำเร็จ! กรุณาตรวจสอบอีเมลและคลิก link ยืนยันก่อนเข้าสู่ระบบ", "success");
      switchTab("login");
    } catch (e) {
      showMsg(getErrorMsg(e.code), "error");
    } finally {
      setLoading("btn-register", false, "สร้างบัญชี");
    }
  });

  // ── Login ──
  document.getElementById("btn-login").addEventListener("click", async () => {
    const email = document.getElementById("login-email").value.trim();
    const pass  = document.getElementById("login-password").value;
    if (!email || !pass) return showMsg("กรุณากรอกอีเมลและรหัสผ่าน", "error");
    setLoading("btn-login", true, "เข้าสู่ระบบ");
    try {
      const result = await signInWithEmailAndPassword(auth, email, pass);
      if (!result.user.emailVerified) {
        await signOut(auth);
        showMsg("กรุณายืนยันอีเมลก่อนเข้าสู่ระบบ ตรวจสอบ inbox ของคุณ", "error");
        return;
      }
    } catch (e) {
      showMsg(getErrorMsg(e.code), "error");
    } finally {
      setLoading("btn-login", false, "เข้าสู่ระบบ");
    }
  });

  // ── Google ──
  function handleGoogle() {
    signInWithPopup(auth, provider).catch(e => showMsg(getErrorMsg(e.code), "error"));
  }
  document.getElementById("btn-google-login").addEventListener("click", handleGoogle)
  document.getElementById("btn-google-register").addEventListener("click", handleGoogle);

  // ── Logout ──
  window.handleLogout = async function() {
    await signOut(auth);
  };
</script>

</body>
</html>
